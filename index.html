<!doctype html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Scrabble Indonesia Online</title><script src="/socket.io/socket.io.js"></script><style>
:root{--bg:#f5f3ea;--panel:#fffaf0;--tile:#f2c46d;--tile2:#e7b354;--board:#d8c8a8;--cell:#eadfc7;--dl:#9fd3ff;--tl:#3f8ddc;--dw:#ffa1b5;--tw:#e0445e;--ok:#1f8f4d;--bad:#b42318;--shadow:0 8px 24px #0002}*{box-sizing:border-box}body{margin:0;font-family:system-ui;background:var(--bg)}.app{max-width:820px;margin:auto;padding:8px;display:flex;flex-direction:column;gap:8px}.card,.panel{background:var(--panel);border-radius:18px;padding:12px;box-shadow:var(--shadow)}h1{font-size:19px;margin:0}.small{font-size:12px;color:#6b655d}.btn{border:0;border-radius:12px;padding:10px 12px;font-weight:800;background:#222;color:white}.secondary{background:white;color:#222}.ok{background:var(--ok)}.danger{background:var(--bad)}input{font:inherit;border:2px solid #ddd;border-radius:12px;padding:10px;width:100%;margin:4px 0}.row{display:flex;gap:8px}.row>*{flex:1}.boardWrap{background:var(--board);padding:6px;border-radius:16px}.board{display:grid;grid-template-columns:repeat(15,1fr);gap:2px;aspect-ratio:1/1}.cell{position:relative;border-radius:5px;background:var(--cell);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;overflow:hidden}.dl{background:var(--dl)}.tl{background:var(--tl);color:white}.dw{background:var(--dw)}.tw{background:var(--tw);color:white}.center:after{content:'★';position:absolute;font-size:14px;opacity:.45}.new{outline:3px solid #111;outline-offset:-3px}.tile{border-radius:6px;background:linear-gradient(145deg,var(--tile),var(--tile2));display:flex;align-items:center;justify-content:center;box-shadow:inset 0 -2px 0 #0003;font-weight:900;color:#2b1c05;position:relative}.cell .tile{width:92%;height:92%}.letter{font-size:clamp(12px,3.1vw,22px)}.points{position:absolute;right:4px;bottom:2px;font-size:9px}.rack{display:grid;grid-template-columns:repeat(9,1fr);gap:4px}.rack .tile{aspect-ratio:1/1}.selected{outline:4px solid #111}.players{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.player{border:2px solid transparent;border-radius:14px;padding:8px;background:white}.active{border-color:#111}.me{background:#eef7ff}.actions{display:grid;grid-template-columns:1.2fr 1fr 1fr;gap:7px}.bad{color:var(--bad);font-weight:800}.oktxt{color:var(--ok);font-weight:800}.log{font-size:12px;color:#666;max-height:70px;overflow:auto}@media(max-width:480px){.actions{grid-template-columns:1fr}.btn{font-size:13px}.cell{font-size:7px}.points{font-size:7px}}
</style></head><body><div class="app">
<section id="lobby" class="card"><h1>Scrabble Indonesia Online</h1><div class="small">2–4 pemain • HP masing-masing • distribusi resmi Indonesia</div><input id="name" placeholder="Nama pemain"><div class="row"><button class="btn ok" onclick="createRoom()">Buat Room</button><button class="btn secondary" onclick="joinRoom()">Masuk Room</button></div><input id="code" placeholder="Kode room" maxlength="4" style="text-transform:uppercase"><p id="lobbyMsg" class="bad"></p></section>
<section id="game" style="display:none"><div class="panel"><div class="row"><div><h1>Room <span id="roomCode"></span></h1><div class="small">Bag: <span id="bagCount"></span></div></div><button id="startBtn" class="btn ok" onclick="startGame()">Mulai</button></div><div id="players" class="players"></div><div id="status" class="oktxt">Menunggu pemain...</div></div><section class="boardWrap"><div id="board" class="board"></div></section><section class="panel"><div class="small">Rak kamu</div><div id="rack" class="rack"></div><div class="actions" style="margin-top:10px"><button class="btn ok" onclick="play()">Mainkan</button><button class="btn secondary" onclick="clearPending()">Batal</button><button class="btn secondary" onclick="pass()">Lewat</button></div><button id="forceBtn" class="btn danger" style="display:none;width:100%;margin-top:8px" onclick="forcePlay()">Sahkan Manual dan Mainkan</button><div class="log" id="log"></div></section></section></div>
<script>
const socket=io();let state=null,selected=null,pending=[],pendingMap={};const SIZE=15,CENTER=7,PREM={};function mark(t,a){a.forEach(([r,c])=>PREM[`${r-1},${c-1}`]=t)}mark('tw',[[1,1],[1,8],[1,15],[8,1],[8,15],[15,1],[15,8],[15,15]]);mark('dw',[[2,2],[3,3],[4,4],[5,5],[8,8],[11,11],[12,12],[13,13],[14,14],[2,14],[3,13],[4,12],[5,11],[11,5],[12,4],[13,3],[14,2]]);mark('tl',[[2,6],[2,10],[6,2],[6,6],[6,10],[6,14],[10,2],[10,6],[10,10],[10,14],[14,6],[14,10]]);mark('dl',[[1,4],[1,12],[3,7],[3,9],[4,1],[4,8],[4,15],[7,3],[7,7],[7,9],[7,13],[8,4],[8,12],[9,3],[9,7],[9,9],[9,13],[12,1],[12,8],[12,15],[13,7],[13,9],[15,4],[15,12]]);
function tileHTML(t){let l=t.blank?(t.resolved||'?'):t.letter;return`<div class="tile"><span class="letter">${l}</span><span class="points">${t.points}</span></div>`}function nameVal(){return document.getElementById("name").value||"Pemain"}function createRoom(){socket.emit("createRoom",{name:nameVal()})}function joinRoom(){socket.emit("joinRoom",{name:nameVal(),code:document.getElementById("code").value})}function startGame(){socket.emit("startGame")}function pass(){socket.emit("passTurn");clearPending(false)}function play(){socket.emit("playMove",{placements:pending,force:false})}function forcePlay(){socket.emit("playMove",{placements:pending,force:true});document.getElementById("forceBtn").style.display="none"}
socket.on("errorMsg",m=>{document.getElementById("lobbyMsg").textContent=m;setStatus(m,true)});socket.on("moveRejected",r=>{setStatus(r.msg+" Bisa disahkan manual jika semua setuju.",true);document.getElementById("forceBtn").style.display="block"});socket.on("state",s=>{state=s;document.getElementById("lobby").style.display="none";document.getElementById("game").style.display="block";clearPending(false);render()});
function render(){document.getElementById("roomCode").textContent=state.code;document.getElementById("bagCount").textContent=state.bagCount;document.getElementById("startBtn").style.display=(!state.started&&state.yourIndex===0)?"block":"none";renderPlayers();renderBoard();renderRack();let turn=state.players[state.current];setStatus(state.started?(turn.id===state.yourId?"Giliranmu.":`Giliran ${turn.name}.`):"Menunggu host mulai game.",false);document.getElementById("log").innerHTML=state.log.map(x=>`<div>${x}</div>`).join("")}
function renderPlayers(){document.getElementById("players").innerHTML=state.players.map((p,i)=>`<div class="player ${i===state.current?'active':''} ${p.id===state.yourId?'me':''}"><b>${p.name}</b><br><span style="font-size:22px;font-weight:900">${p.score}</span><br><span class="small">${p.rackCount} huruf ${p.connected?'':'• offline'}</span></div>`).join("")}
function renderBoard(){let el=document.getElementById("board");el.innerHTML="";for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){let cell=document.createElement("div"),prem=PREM[`${r},${c}`]||"",key=`${r},${c}`,pt=pendingMap[key],real=state.board[r][c];cell.className=`cell ${prem} ${r===CENTER&&c===CENTER?'center':''} ${pt?'new':''}`;cell.onclick=()=>place(r,c);cell.innerHTML=real?tileHTML(real):pt?tileHTML(pt):(prem?prem.toUpperCase():"");el.appendChild(cell)}}
function renderRack(){let used=new Set(pending.map(p=>p.id)),rack=state.yourRack.filter(t=>!used.has(t.id)),el=document.getElementById("rack");el.innerHTML="";rack.forEach(t=>{let d=document.createElement("div");d.className="tile"+(selected?.id===t.id?" selected":"");d.onclick=()=>{selected=selected?.id===t.id?null:t;renderRack()};d.innerHTML=`<span class="letter">${t.letter}</span><span class="points">${t.points}</span>`;el.appendChild(d)})}
function place(r,c){if(!state.started)return setStatus("Game belum dimulai.",true);if(state.players[state.current].id!==state.yourId)return setStatus("Belum giliranmu.",true);if(!selected)return setStatus("Pilih huruf di rak dulu.",true);if(state.board[r][c]||pendingMap[`${r},${c}`])return setStatus("Kotak sudah terisi.",true);let tile={...selected},resolved=null;if(tile.blank){resolved=prompt("Blank menjadi huruf apa? A-Z","A");if(!resolved||!/^[A-Za-z]$/.test(resolved))return;resolved=resolved.toUpperCase();tile.resolved=resolved}pending.push({r,c,id:selected.id,resolved});pendingMap[`${r},${c}`]=tile;selected=null;document.getElementById("forceBtn").style.display="none";renderBoard();renderRack()}
function clearPending(show=true){pending=[];pendingMap={};selected=null;document.getElementById("forceBtn").style.display="none";if(show&&state)render()}function setStatus(m,bad){let e=document.getElementById("status");if(e){e.textContent=m;e.className=bad?"bad":"oktxt"}}
</script></body></html>
